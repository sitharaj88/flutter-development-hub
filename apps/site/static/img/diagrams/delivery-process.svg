  <text x="456" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#1a1a2e" font-weight="600">Execution</text>
  <!-- Arrow 3 -->
  <line x1="534" y1="65" x2="560" y2="65" stroke="url(#dp-grad)" stroke-width="2.5" stroke-linecap="round"/>
