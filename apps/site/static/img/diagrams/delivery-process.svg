<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" fill="none">
  <defs>
    <linearGradient id="dp-grad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6a3d"/>
      <stop offset="100%" stop-color="#0cc4e2"/>
    </linearGradient>
    <filter id="dp-shadow" x="-4%" y="-10%" width="108%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Step 1 -->
  <rect x="10" y="30" width="148" height="70" rx="14" fill="#fff" stroke="#ff6a3d" stroke-width="2" filter="url(#dp-shadow)"/>
