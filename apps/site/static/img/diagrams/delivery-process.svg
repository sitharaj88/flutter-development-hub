  <text x="84" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">Understand the</text>
  <text x="84" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">real situation</text>
  <text x="270" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">Shape the</text>
  <text x="270" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">engagement</text>
  <text x="456" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">Deliver technical</text>
  <text x="456" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">work</text>
  <text x="642" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">Strengthen &amp;</text>
  <text x="642" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">document</text>
  <text x="823" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">Ongoing</text>
  <text x="823" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666">support</text>
