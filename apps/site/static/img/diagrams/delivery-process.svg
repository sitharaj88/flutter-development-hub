  <!-- Step 4 -->
  <rect x="568" y="30" width="148" height="70" rx="14" fill="#fff" stroke="#38b2a0" stroke-width="2" filter="url(#dp-shadow)"/>
  <text x="642" y="58" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#38b2a0" font-weight="700">STEP 4</text>
  <text x="642" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#1a1a2e" font-weight="600">Stabilization</text>
  <!-- Arrow 4 -->
  <line x1="720" y1="65" x2="746" y2="65" stroke="url(#dp-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="744,59 754,65 744,71" fill="url(#dp-grad)"/>
  <!-- Step 5 -->
  <rect x="754" y="30" width="138" height="70" rx="14" fill="#fff" stroke="#0cc4e2" stroke-width="2" filter="url(#dp-shadow)"/>
