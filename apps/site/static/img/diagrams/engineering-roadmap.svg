  <rect x="618" y="16" width="260" height="64" rx="14" fill="#fff" stroke="#0cc4e2" stroke-width="2" filter="url(#er-shadow)"/>
  <text x="636" y="42" font-family="system-ui,sans-serif" font-size="11" fill="#0cc4e2" font-weight="700">PHASE 3</text>
  <text x="636" y="62" font-family="system-ui,sans-serif" font-size="15" fill="#1a1a2e" font-weight="600">Engineering Platform</text>
  <!-- Phase 1 items -->
  <circle cx="30" cy="108" r="4" fill="#ff6a3d"/>
  <text x="42" y="112" font-family="system-ui,sans-serif" font-size="11" fill="#555">Training docs</text>
