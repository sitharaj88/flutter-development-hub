<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" fill="none">
  <defs>
    <filter id="cp-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="cp-arrow" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6a3d"/>
      <stop offset="50%" stop-color="#38b2a0"/>
      <stop offset="100%" stop-color="#0cc4e2"/>
    </linearGradient>
  </defs>
  <!-- Background arrow -->
  <line x1="60" y1="48" x2="856" y2="48" stroke="url(#cp-arrow)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="856,48 844,42 844,54" fill="#0cc4e2"/>
  <!-- Step 1 -->
  <rect x="16" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#ff6a3d" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="60" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ff6a3d" font-weight="700">1. Scope</text>
  <text x="60" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">Define idea</text>
  <!-- Step 2 -->
  <rect x="130" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#e85d30" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="174" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#e85d30" font-weight="700">2. Plan</text>
  <text x="174" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">Task breakdown</text>
  <!-- Step 3 -->
  <rect x="244" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#c47a3a" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="288" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c47a3a" font-weight="700">3. Design</text>
  <text x="288" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">UI &amp; wireframes</text>
  <!-- Step 4 -->
  <rect x="358" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#8a9e52" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="402" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8a9e52" font-weight="700">4. Build</text>
  <text x="402" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">Code sprints</text>
  <!-- Step 5 -->
  <rect x="472" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#38b2a0" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="516" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#38b2a0" font-weight="700">5. Review</text>
  <text x="516" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">Code review</text>
  <!-- Step 6 -->
  <rect x="586" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#1dbdd1" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="630" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1dbdd1" font-weight="700">6. Refine</text>
  <text x="630" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">Polish &amp; test</text>
  <!-- Step 7 -->
  <rect x="700" y="22" width="88" height="52" rx="10" fill="#fff" stroke="#0cc4e2" stroke-width="1.5" filter="url(#cp-shadow)"/>
  <text x="744" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0cc4e2" font-weight="700">7. Present</text>
  <text x="744" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">Demo day</text>
  <!-- Week labels -->
  <text x="60" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bbb">Week 1</text>
  <text x="230" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bbb">Weeks 2–3</text>
  <text x="450" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bbb">Weeks 4–6</text>
  <text x="690" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bbb">Weeks 7–8</text>
</svg>