<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" fill="none">
  <defs>
    <filter id="ps-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <!-- Title -->
  <text x="290" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#1a1a2e" font-weight="700">Project Structure</text>
  <!-- lib/ root -->
  <rect x="22" y="44" width="80" height="30" rx="8" fill="#1a1a2e" filter="url(#ps-shadow)"/>
  <text x="62" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#fff" font-weight="600">lib/</text>
  <!-- vertical line from lib -->
  <line x1="62" y1="74" x2="62" y2="310" stroke="#ddd" stroke-width="1.5"/>
  <!-- app/ branch -->
  <line x1="62" y1="100" x2="110" y2="100" stroke="#7c5cbf" stroke-width="1.5"/>
  <rect x="110" y="84" width="120" height="32" rx="8" fill="#fff" stroke="#7c5cbf" stroke-width="1.5" filter="url(#ps-shadow)"/>
  <text x="170" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7c5cbf" font-weight="600">📁 app/</text>
  <!-- app children -->
  <line x1="230" y1="100" x2="270" y2="100" stroke="#ddd" stroke-width="1"/>
  <text x="278" y="94" font-family="system-ui,sans-serif" font-size="10" fill="#999">app.dart</text>
  <text x="278" y="108" font-family="system-ui,sans-serif" font-size="10" fill="#999">router.dart · theme.dart</text>
  <!-- features/ branch -->
  <line x1="62" y1="148" x2="110" y2="148" stroke="#ff6a3d" stroke-width="1.5"/>
  <rect x="110" y="132" width="120" height="32" rx="8" fill="#fff" stroke="#ff6a3d" stroke-width="1.5" filter="url(#ps-shadow)"/>
  <text x="170" y="153" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ff6a3d" font-weight="600">📁 features/</text>
  <!-- features children -->
  <line x1="230" y1="148" x2="260" y2="148" stroke="#ddd" stroke-width="1"/>
  <line x1="260" y1="148" x2="260" y2="240" stroke="#ddd" stroke-width="1"/>
  <!-- auth -->
  <line x1="260" y1="160" x2="290" y2="160" stroke="#ff6a3d" stroke-width="1"/>
  <rect x="290" y="146" width="100" height="28" rx="6" fill="#fff4f0" stroke="#ff6a3d" stroke-width="1"/>
  <text x="340" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#ff6a3d" font-weight="600">auth/</text>
  <text x="400" y="164" font-family="system-ui,sans-serif" font-size="9" fill="#999">data/ · domain/ · presentation/</text>
  <!-- home -->
  <line x1="260" y1="196" x2="290" y2="196" stroke="#0cc4e2" stroke-width="1"/>
  <rect x="290" y="182" width="100" height="28" rx="6" fill="#eef9fc" stroke="#0cc4e2" stroke-width="1"/>
  <text x="340" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0cc4e2" font-weight="600">home/</text>
  <text x="400" y="200" font-family="system-ui,sans-serif" font-size="9" fill="#999">data/ · domain/ · presentation/</text>
  <!-- settings -->
  <line x1="260" y1="232" x2="290" y2="232" stroke="#38b2a0" stroke-width="1"/>
  <rect x="290" y="218" width="100" height="28" rx="6" fill="#f0faf7" stroke="#38b2a0" stroke-width="1"/>
  <text x="340" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#38b2a0" font-weight="600">settings/</text>
  <text x="400" y="236" font-family="system-ui,sans-serif" font-size="9" fill="#999">data/ · domain/ · presentation/</text>
  <!-- shared/ branch -->
  <line x1="62" y1="274" x2="110" y2="274" stroke="#38b2a0" stroke-width="1.5"/>
  <rect x="110" y="258" width="120" height="32" rx="8" fill="#fff" stroke="#38b2a0" stroke-width="1.5" filter="url(#ps-shadow)"/>
  <text x="170" y="279" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#38b2a0" font-weight="600">📁 shared/</text>
  <!-- shared children -->
  <line x1="230" y1="274" x2="270" y2="274" stroke="#ddd" stroke-width="1"/>
  <text x="278" y="268" font-family="system-ui,sans-serif" font-size="10" fill="#999">widgets/ · utils/</text>
  <text x="278" y="282" font-family="system-ui,sans-serif" font-size="10" fill="#999">constants/</text>
  <!-- main.dart -->
  <line x1="62" y1="310" x2="110" y2="310" stroke="#c4a24e" stroke-width="1.5"/>
  <rect x="110" y="296" width="120" height="28" rx="8" fill="#fff" stroke="#c4a24e" stroke-width="1.5" filter="url(#ps-shadow)"/>
  <text x="170" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c4a24e" font-weight="600">main.dart</text>
</svg>