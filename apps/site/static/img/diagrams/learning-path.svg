<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" fill="none">
  <defs>
    <linearGradient id="lp-line" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6a3d"/>
      <stop offset="50%" stop-color="#38b2a0"/>
      <stop offset="100%" stop-color="#0cc4e2"/>
    </linearGradient>
    <filter id="lp-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <!-- Connecting line -->
  <line x1="65" y1="52" x2="845" y2="52" stroke="url(#lp-line)" stroke-width="3" stroke-linecap="round"/>
  <!-- Stage 1 -->
  <circle cx="65" cy="52" r="22" fill="#ff6a3d" filter="url(#lp-shadow)"/>
  <text x="65" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">1</text>
  <text x="65" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Programming</text>
  <text x="65" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Foundations</text>
  <!-- Stage 2 -->
  <circle cx="195" cy="52" r="22" fill="#e85d30" filter="url(#lp-shadow)"/>
  <text x="195" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">2</text>
  <text x="195" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Dart</text>
  <text x="195" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">In Depth</text>
  <!-- Stage 3 -->
  <circle cx="325" cy="52" r="22" fill="#c47a3a" filter="url(#lp-shadow)"/>
  <text x="325" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">3</text>
  <text x="325" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Flutter</text>
  <text x="325" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">UI Core</text>
  <!-- Stage 4 -->
  <circle cx="455" cy="52" r="22" fill="#8a9e52" filter="url(#lp-shadow)"/>
  <text x="455" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">4</text>
  <text x="455" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Design</text>
  <text x="455" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">&amp; UX</text>
  <!-- Stage 5 -->
  <circle cx="585" cy="52" r="22" fill="#38b2a0" filter="url(#lp-shadow)"/>
  <text x="585" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">5</text>
  <text x="585" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Architecture</text>
  <text x="585" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">&amp; Data</text>
  <!-- Stage 6 -->
  <circle cx="715" cy="52" r="22" fill="#1dbdd1" filter="url(#lp-shadow)"/>
  <text x="715" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">6</text>
  <text x="715" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Testing</text>
  <text x="715" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">&amp; Release</text>
  <!-- Stage 7 -->
  <circle cx="845" cy="52" r="22" fill="#0cc4e2" filter="url(#lp-shadow)"/>
  <text x="845" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">7</text>
  <text x="845" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">Capstone</text>
  <text x="845" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a2e" font-weight="600">&amp; Proof</text>
  <!-- Difficulty label -->
  <text x="65" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#999">Beginner</text>
  <text x="455" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#999">Intermediate</text>
  <text x="845" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#999">Advanced</text>
  <line x1="130" y1="140" x2="385" y2="140" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="520" y1="140" x2="775" y2="140" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
</svg>